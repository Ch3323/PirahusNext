version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # - DATABASE_URL=postgresql://user:password@db:5432/pirahus?schema=public
    # Uncomment the lines below if you want the app to wait for the local DB to be ready
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped

